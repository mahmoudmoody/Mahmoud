<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahmoud Sales - العقارات</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #000000; color: #ffffff; text-align: center; }
    .header { position: relative; height: 320px; background: url("logo.png") center / cover no-repeat; }
    .header::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 160px; background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, #000000 90%); }
    .container { max-width: 360px; margin: -40px auto 0; padding: 0 20px 40px; }
    h1 { font-size: 24px; margin-top: 10px; }
    #typing-text { font-size: 16px; opacity: 0.9; margin: 15px 0; min-height: 20px; color: #ffc107; }
    button, a { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.08); color: white; text-decoration: none; padding: 16px; margin: 14px 0; border-radius: 18px; font-size: 18px; backdrop-filter: blur(8px); transition: transform 0.15s ease; border: none; cursor: pointer; width: 100%; }
    button:active { transform: scale(0.97); }
    .whatsapp { background: rgba(37,211,102,0.28); }
    .call { background: rgba(59,130,246,0.28); }
    .location { background: rgba(239,68,68,0.28); }
    .btn-quiz { background: rgba(255, 193, 7, 0.2); color: #ffc107; font-weight: bold; }
    .quiz-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 18px; margin-bottom: 20px; display: none; }
    .option-btn { background: rgba(255,255,255,0.1); width: 100%; padding: 12px; border-radius: 10px; border: none; color: white; cursor: pointer; margin: 5px 0; }
    input[type="range"] { width: 100%; margin: 20px 0; accent-color: #ffc107; }
    input[type="text"], input[type="tel"] { width: 100%; padding: 12px; border-radius: 10px; border: none; margin: 8px 0; background: rgba(255,255,255,0.9); color: #000; font-size: 16px; text-align: center; }
    .footer { margin-top: 30px; font-size: 13px; opacity: 0.6; line-height: 1.8; }
</style>
</head>
<body>

<div class="header"></div>
<div class="container">
  <h1>Mahmoud Sales</h1>
  <div id="typing-text"></div>

  <button class="btn-quiz" onclick="document.getElementById('quiz-box').style.display='block'">اكتشف وحدتك المناسبة</button>
  
  <form id="quiz-box" class="quiz-box" onsubmit="sendToTelegram(event)">
    <div id="step1">
      <p>ما هو نوع الوحدة؟</p>
      <input type="hidden" name="النوع" id="type-input">
      <button type="button" class="option-btn" onclick="selectType('شقة')">شقة</button>
      <button type="button" class="option-btn" onclick="nextStep('فيلا', 'step1', 'step3')">فيلا</button>
      <button type="button" class="option-btn" onclick="nextStep('عمارة', 'step1', 'step3')">عمارة</button>
    </div>

    <div id="step2" style="display:none;">
      <p>اختر الدور:</p>
      <input type="hidden" name="الدور" id="floor-input">
      <button type="button" class="option-btn" onclick="nextStep('أرضي', 'step2', 'step3')">أرضي</button>
      <button type="button" class="option-btn" onclick="nextStep('دوبلكس', 'step2', 'step3')">دوبلكس</button>
      <button type="button" class="option-btn" onclick="nextStep('أول', 'step2', 'step3')">أول</button>
      <button type="button" class="option-btn" onclick="nextStep('ثاني', 'step2', 'step3')">ثاني</button>
      <button type="button" class="option-btn" onclick="nextStep('ثالث', 'step2', 'step3')">ثالث</button>
      <button type="button" class="option-btn" onclick="nextStep('روف', 'step2', 'step3')">روف</button>
    </div>
    
    <div id="step3" style="display:none;">
      <p>طريقة الدفع؟</p>
      <input type="hidden" name="الدفع" id="payment-input">
      <button type="button" class="option-btn" onclick="setBudgetAndNext('كاش', 1000000)">كاش</button>
      <button type="button" class="option-btn" onclick="setBudgetAndNext('قسط', 700000)">قسط</button>
    </div>

    <div id="step4" style="display:none;">
      <p>تفاصيل الاتصال:</p>
      <input type="text" name="الاسم_الثنائي" placeholder="اسمك الثنائي" required>
      <input type="tel" name="رقم_التليفون" placeholder="رقم الموبايل" required>
      <p>الميزانية/المقدم:</p>
      <input type="range" id="budget-range" name="الميزانية" min="1000000" max="20000000" step="50000" value="1000000" oninput="document.getElementById('bud-val').innerText = parseInt(this.value).toLocaleString() + ' ج.م'">
      <p id="bud-val" style="color:#ffc107">1,000,000 ج.م</p>
      <button type="submit" class="btn-quiz">إرسال الطلب</button>
    </div>
  </form>

  <div id="thanks-msg" style="display:none; padding: 25px; background: rgba(255,255,255,0.05); border-radius: 18px;">
      <i class="fa-solid fa-circle-check" style="font-size: 45px; color: #25D366; margin-bottom: 15px;"></i>
      <h2 style="color: #ffc107; margin-bottom: 10px;">شكراً لثقتك في Mahmoud Sales!</h2>
      <p style="color: #ffffff; font-size: 16px;">تم استلام طلبك وسنتواصل معك قريباً.</p>
  </div>

  <a class="whatsapp" href="https://wa.me/201090315229" target="_blank"><i class="fa-brands fa-whatsapp"></i> واتساب</a>
  <a class="call" href="tel:+201090315229"><i class="fa-solid fa-phone"></i> اتصل بنا</a>
  <a class="location" href="https://maps.app.goo.gl/sojbHSfqcmGSnEqX7?g_st=ic" target="_blank"><i class="fa-solid fa-location-dot"></i> موقعنا</a>

  <div class="footer">
    <p>⏰ مواعيد العمل: يومياً من 10 ص - 6 م</p>
    شركه تطوير للاستثمار العقاري ترحب بكم 🏡❤️
  </div>
</div>

<script>
  function selectType(val) {
    document.getElementById('type-input').value = val;
    if(val === 'شقة') {
      document.getElementById('step1').style.display='none';
      document.getElementById('step2').style.display='block';
    } else {
      document.getElementById('step1').style.display='none';
      document.getElementById('step3').style.display='block';
    }
  }

  function nextStep(val, current, next) { 
    if(current === 'step1') document.getElementById('type-input').value = val;
    if(current === 'step2') document.getElementById('floor-input').value = val;
    document.getElementById(current).style.display='none'; 
    document.getElementById(next).style.display='block'; 
  }

  function setBudgetAndNext(paymentType, minVal) {
    document.getElementById('payment-input').value = paymentType;
    const range = document.getElementById('budget-range');
    range.min = minVal;
    range.value = minVal;
    document.getElementById('bud-val').innerText = minVal.toLocaleString() + ' ج.م';
    document.getElementById('step3').style.display = 'none';
    document.getElementById('step4').style.display = 'block';
  }
  
  async function sendToTelegram(event) {
    event.preventDefault();
    const token = "8869922515:AAFDHbzztpQdeZ9W8V8aLdWm0fm_BIgB3jY";
    const chatId = "8207978872"; 
    const formData = new FormData(event.target);
    const msg = `🏡 طلب جديد:\n👤 الاسم: ${formData.get('الاسم_الثنائي')}\n📞 الموبايل: ${formData.get('رقم_التليفون')}\n🎯 النوع: ${formData.get('النوع')}\n🏠 الدور: ${formData.get('الدور') || 'غير محدد'}\n💰 الدفع: ${formData.get('الدفع')}\n💵 المبلغ: ${formData.get('الميزانية')} ج.م`;

    try {
        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: chatId, text: msg })
        });
        document.getElementById('quiz-box').style.display='none';
        document.getElementById('thanks-msg').style.display='block';
    } catch (e) { alert("حدث خطأ، تأكد من الاتصال."); }
  }
</script>
</body>
</html>
